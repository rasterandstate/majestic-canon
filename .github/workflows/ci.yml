# Majestic Canon CI — validate, sanity-check, test.
# No continue-on-error. No retries. Fails loudly.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm run validate

      - name: Sanity check
        run: pnpm run sanity-check

      - run: pnpm test
